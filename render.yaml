services:
  - type: web
    name: pm-backend
    runtime: node
    buildCommand: npm install && npx nest build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: pm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /

databases:
  - name: pm-db
    databaseName: pm_db
    user: admin
    plan: free
